<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Hub | Upper Labay High School</title>
    <meta name="description" content="Enroll now at Upper Labay High School. Check our checklist and digital enrollment system for JHS and SHS.">
    <link rel="icon" type="image/webp" href="../assets/images/school-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <!-- Loaded dynamically from header.html -->
    </header>

    <div class="beadwork-strip"></div>

    <main>
        <section class="page-banner" id="enrollment-banner">
            <!-- Content loaded dynamically from enrollment.json -->
            <p class="loading-text">Loading enrollment hub...</p>
        </section>

        <section class="section-container reveal reveal-bottom">
            <div class="split-grid" id="enrollment-paths">
                <!-- Content loaded dynamically from enrollment.json -->
                <p class="loading-text">Loading enrollment paths...</p>
            </div>
        </section>

        <!-- General Enrollment Info -->
        <section class="section-container bg-light reveal reveal-bottom" id="enrollment-schedule">
            <div class="intro-text">
                <!-- Content loaded dynamically from enrollment.json -->
            </div>
        </section>

    </main>

    <footer>
        <!-- Loaded dynamically from footer.html -->
    </footer>
    <script src="../assets/js/main.js"></script>

    <script>
        // Show success message if redirected from FormSubmit.co
        if (window.location.search.includes('submitted=true')) {
            document.addEventListener('DOMContentLoaded', function() {
                const modal = document.getElementById('enroll-thanks-modal');
                if (modal) {
                    const titleEl = modal.querySelector('#enroll-thanks-title');
                    const messageEl = modal.querySelector('#enroll-thanks-message');
                    
                    if (titleEl) titleEl.textContent = 'Enrollment Submitted Successfully!';
                    if (messageEl) messageEl.textContent = 'Thank you for your enrollment submission! Your documents have been received and will be processed by our school staff. Please wait for further instructions via school announcements or Facebook updates.';
                    
                    modal.hidden = false;
                    
                    // Clean up URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            });
        }
    </script>

    <div class="enroll-modal" id="enroll-thanks-modal" hidden>
        <div class="enroll-modal-content" role="dialog" aria-modal="true" aria-labelledby="enroll-thanks-title">
            <h3 id="enroll-thanks-title" class="accent-title">Thank you!</h3>
            <p id="enroll-thanks-message">Your enrollment details were submitted successfully. Please wait for further instructions via school announcements or Facebook updates.</p>
            <button type="button" class="btn" id="enroll-thanks-close">Close</button>
        </div>
    </div>

    <!-- AI FAQ BOT STRUCTURE -->
    <div class="faq-bot-container">
        <div class="faq-bot-toggle" id="faq-bot-toggle">
            <span class="bot-icon">💬</span>
        </div>
        <div class="faq-bot-window" id="faq-bot-window">
            <div class="faq-bot-header">
                <h4>ULHS Assistant</h4>
                <span class="faq-bot-close" id="faq-bot-close">&times;</span>
            </div>
            <div class="faq-bot-messages" id="faq-bot-messages"></div>
            <div class="faq-suggestions">
                <span class="suggestion-chip">Enrollment</span>
                <span class="suggestion-chip">Scholarships</span>
                <span class="suggestion-chip">SHS Tracks</span>
            </div>
            <div class="faq-bot-input-area">
                <input type="text" class="faq-bot-input" id="faq-bot-input" placeholder="Ask a question...">
                <button class="faq-bot-send" id="faq-bot-send">➤</button>
            </div>
        </div>
    </div>
</body>
</html>
