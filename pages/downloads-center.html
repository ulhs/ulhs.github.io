<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads Center | Upper Labay High School</title>
    <meta name="description" content="Download enrollment forms, school references, reports, and official files from Upper Labay High School in one place.">
    <link rel="icon" type="image/webp" href="../assets/images/school-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <!-- Loaded dynamically from header.html -->
    </header>

    <div class="beadwork-strip"></div>

    <main>
        <section class="page-banner" id="downloads-banner">
            <!-- Content loaded dynamically from downloads.json -->
            <p class="loading-text">Loading downloads center...</p>
        </section>

        <section class="section-container reveal reveal-bottom">
            <div class="intro-text reveal reveal-bottom delay-1" id="downloads-intro">
                <!-- Content loaded dynamically from downloads.json -->
            </div>

            <div class="downloads-grid" id="downloads-grid">
                <!-- Content loaded dynamically from downloads.json -->
                <p class="loading-text">Loading files...</p>
            </div>

            <p class="download-hint">Need more help? You can also visit the <a href="enrollment.html">Enrollment Hub</a>, the <a href="calendar.html">Calendar</a>, or the <a href="transparency.html">Transparency Board</a> for context and additional guidance.</p>
        </section>
    </main>

    <footer>
        <!-- Loaded dynamically from footer.html -->
    </footer>
    <script src="../assets/js/main.js"></script>

    <div class="faq-bot-container">
        <div class="faq-bot-toggle" id="faq-bot-toggle">
            <span class="bot-icon">💬</span>
        </div>
        <div class="faq-bot-window" id="faq-bot-window">
            <div class="faq-bot-header">
                <h4>ULHS Assistant</h4>
                <span class="faq-bot-close" id="faq-bot-close">&times;</span>
            </div>
            <div class="faq-bot-messages" id="faq-bot-messages"></div>
            <div class="faq-suggestions">
                <span class="suggestion-chip">Enrollment</span>
                <span class="suggestion-chip">Calendar</span>
                <span class="suggestion-chip">Forms</span>
            </div>
            <div class="faq-bot-input-area">
                <input type="text" class="faq-bot-input" id="faq-bot-input" placeholder="Ask a question...">
                <button class="faq-bot-send" id="faq-bot-send">➤</button>
            </div>
        </div>
    </div>
</body>
</html>
