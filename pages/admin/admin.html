<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Upper Labay High School</title>
    <link rel="icon" type="image/webp" href="../../assets/images/school-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&family=Acme&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="../../assets/images/school-logo.webp" alt="Logo" class="login-logo">
            <h2>Admin Portal</h2>
            <form id="login-form" class="login-form">
                <input type="password" id="password" placeholder="Enter Admin Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="login-links">
                <a href="../../index.html" class="back-link">Back to Homepage</a>
            </div>
            <p id="error-msg" class="error-msg" style="display: none;">Incorrect password. Please try again.</p>
        </div>
    </div>

    <script src="../../assets/js/main.js"></script>
</body>
</html>
