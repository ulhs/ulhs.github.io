<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gstatic.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://*.supabase.net wss://*.supabase.co wss://*.supabase.net https://cdn.jsdelivr.net https://api.counterapi.dev;">
    <title>Personnel Portal | Upper Labay High School</title>
    <link rel="icon" type="image/webp" href="../../assets/images/school-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&family=Acme&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../assets/js/supabase-config.js"></script>
    <script src="../../assets/js/main.js"></script>
    <link rel="stylesheet" href="../../assets/css/typography.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .login-btn {
            width: 100%; 
            margin-top: 24px; 
            padding: 14px; 
            background: #1e3a8a; 
            color: white; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .login-btn:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="login-container">
        <div class="login-card text-center">
            <img src="../../assets/images/school-logo.webp" alt="Logo" class="login-logo">
            <h2 style="font-family: 'Acme', sans-serif; color: #1e3a8a;">Personnel Portal</h2>
            <p style="font-size: 0.75rem; color: #6b7280; margin-bottom: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin, Faculty & Staff Login</p>
            
            <div id="auth-container">
                <button id="google-login-btn" class="login-btn flex items-center justify-center gap-3" style="display: flex; align-items: center; justify-content: center; gap: 12px; background: white; color: #374151; border: 2px solid #e5e7eb;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                    <span id="login-text" style="font-weight: 800;">Sign in with Google</span>
                </button>
                <div id="auth-status" style="display: none; margin-top: 16px;">
                    <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent"></div>
                    <p id="status-text" style="font-size: 0.65rem; color: #3b82f6; font-weight: 800; text-transform: uppercase; margin-top: 8px;">Verifying Credentials...</p>
                </div>
                <p id="auth-footer-text" style="font-size: 0.65rem; color: #9ca3af; margin-top: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
                    Authorized Personnel Only • Gmail Required
                </p>
            </div>

            <div class="login-links" style="margin-top: 24px;">
                <a href="../../index.html" class="back-link" style="font-size: 0.8rem; color: #6b7280; text-decoration: none; font-weight: 600;">&larr; Back to Homepage</a>
            </div>
            
            <div id="login-error-msg" class="error-msg" style="display: none; background: #fff5f5; color: #c53030; padding: 12px; border-radius: 10px; font-size: 0.75rem; margin-top: 20px; border: 1px solid #feb2b2; font-weight: 700;">
                Unauthorized access. Your email is not on the whitelist.
            </div>
        </div>
    </div>

    <script>
        const googleLoginBtn = document.getElementById('google-login-btn');
        const loginText = document.getElementById('login-text');
        const authStatus = document.getElementById('auth-status');
        const statusText = document.getElementById('status-text');
        const authFooter = document.getElementById('auth-footer-text');
        const errorMsg = document.getElementById('login-error-msg');

        let isProcessing = false;

        async function processSession(session) {
            if (!session || isProcessing) return;
            isProcessing = true;
            
            try {
                googleLoginBtn.style.display = 'none';
                authFooter.style.display = 'none';
                authStatus.style.display = 'block';
                errorMsg.style.display = 'none';

                // 1. Fetch profile
                const { data: profile, error: profileError } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();

                let finalProfile = profile;

                if (profileError || !profile) {
                    statusText.textContent = "Authorizing Account...";
                    
                    // Check Whitelist using a robust query
                    console.log("🔍 Verifying whitelist for:", session.user.email);
                    const { data: whitelist, error: whitelistError } = await window.supabaseClient
                        .from('admin_whitelist')
                        .select('*')
                        .ilike('email', session.user.email.trim())
                        .single();
                    
                    if (whitelistError || !whitelist) {
                        console.error("❌ Whitelist lookup failed:", whitelistError);
                        await window.supabaseClient.auth.signOut();
                        throw new Error("Access Denied: Your email is not whitelisted.");
                    }

                    statusText.textContent = "Setting up Profile...";
                    const profileData = {
                        id: session.user.id,
                        email: session.user.email.toLowerCase().trim(),
                        full_name: session.user.user_metadata.full_name || session.user.email,
                        avatar_url: session.user.user_metadata.avatar_url || null,
                        role: whitelist.role || 'staff',
                        can_scan: whitelist.can_scan || false,
                        can_manage_ids: whitelist.can_manage_ids || false,
                        can_view_dashboard: whitelist.can_view_dashboard || false
                    };

                    const { data: newProfile, error: insertError } = await window.supabaseClient
                        .from('profiles')
                        .insert([profileData])
                        .select()
                        .single();
                    
                    if (insertError) throw new Error("Profile setup failed: " + insertError.message);
                    finalProfile = newProfile;
                }

                statusText.textContent = "Welcome, " + (finalProfile.full_name || "Admin");
                
                // Hydrate Session Storage
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('userEmail', finalProfile.email);
                sessionStorage.setItem('userRole', finalProfile.role);
                sessionStorage.setItem('userName', finalProfile.full_name);
                sessionStorage.setItem('userAccess', JSON.stringify({
                    attendance: finalProfile.can_scan,
                    idGen: finalProfile.can_manage_ids,
                    stats: finalProfile.can_view_dashboard
                }));

                // Audit: Login Action
                if (typeof logAdminAction === 'function') {
                    logAdminAction('LOGIN_SUCCESS');
                }

                // Redirect based on priority
                setTimeout(() => {
                    const access = JSON.parse(sessionStorage.getItem('userAccess'));
                    console.log("🚀 Access Granted. Redirecting with access:", access);
                    let target = './admin-dashboard.html';
                    if (!access.stats) {
                        if (access.attendance) target = './attendance.html';
                        else if (access.idGen) target = './id-gen.html';
                    }
                    window.location.replace(target);
                }, 800);

            } catch (err) {
                console.error("Login Error:", err);
                isProcessing = false;
                googleLoginBtn.style.display = 'flex';
                authFooter.style.display = 'block';
                authStatus.style.display = 'none';
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        }

        async function initAuth() {
            if (!window.supabaseClient) {
                setTimeout(initAuth, 100);
                return;
            }

            // Handle server-side errors from URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error_description')) {
                errorMsg.textContent = "Auth Error: " + urlParams.get('error_description');
                errorMsg.style.display = 'block';
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Handle session
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) processSession(session);

            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                if (session && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
                    processSession(session);
                }
            });
        }

        googleLoginBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            const { error } = await window.supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) {
                errorMsg.textContent = "OAuth Error: " + error.message;
                errorMsg.style.display = 'block';
            }
        });

        initAuth();
    </script>
</body>
</html>
