<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal | Upper Labay High School</title>
    <link rel="icon" type="image/webp" href="../../assets/images/school-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&family=Acme&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/typography.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        #faculty-password:focus {
            border-color: var(--madder-red) !important;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="login-container">
        <div class="login-card text-center">
            <img src="../../assets/images/school-logo.webp" alt="Logo" class="login-logo">
            <h2 style="color: var(--madder-red); font-family: 'Acme', sans-serif;">Faculty Portal</h2>
            <p style="font-size: 0.8rem; color: var(--text-gray); margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Teachers & School Head Login</p>
            
            <form id="faculty-login-form" class="login-form">
                <input type="password" id="faculty-password" placeholder="Enter System Access Key" required 
                       style="border: 2px solid var(--soft-abaca);">
                <button type="submit" class="btn" style="background: var(--madder-red);">Access Dashboard</button>
            </form>

            <div class="login-links">
                <a href="../../index.html" class="back-link">Back to Homepage</a>
            </div>
            
            <div id="faculty-error-msg" class="error-msg" style="display: none; background: #fff5f5; color: #c53030; padding: 10px; border-radius: 8px; font-size: 0.75rem; margin-top: 15px; border: 1px solid #feb2b2; font-weight: 700;">
                Invalid access key or session not yet authorized by Admin.
            </div>
        </div>
    </div>

    <script src="../../assets/js/main.js"></script>
</body>
</html>
